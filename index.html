<script>
(function(){
  var s=localStorage.getItem('theme');
  if(s) document.documentElement.setAttribute('data-theme',s);
})();
</script>
<style>
*, *::before, *::after { box-sizing: border-box; }

:root {
  --bg: #fff;
  --fg: #1a1a1a;
  --muted: #666;
  --border: #e0e0e0;
  --link: #1a1a1a;
  --link-hover: #555;
  --code-bg: #f4f4f4;
  --max-w: min(760px, 92vw);
}

[data-theme="dark"] {
    --bg: #111;
    --fg: #e8e8e8;
    --muted: #888;
    --border: #2a2a2a;
    --link: #e8e8e8;
    --link-hover: #aaa;
    --code-bg: #1e1e1e;
}

@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg: #111;
    --fg: #e8e8e8;
    --muted: #888;
    --border: #2a2a2a;
    --link: #e8e8e8;
    --link-hover: #aaa;
    --code-bg: #1e1e1e;
  }
}

html { font-size: 18px; }

@media (prefers-reduced-motion: no-preference) {
  html { scroll-behavior: smooth; }
}

body {
  background: var(--bg);
  color: var(--fg);
  font-family: ui-serif, Georgia, "Times New Roman", serif;
  line-height: 1.7;
  margin: 0;
  padding: 2rem 1rem;
}

main { max-width: var(--max-w); margin: 0 auto; overflow-wrap: break-word; }

article p, article li {
  text-align: justify;
  text-justify: inter-word;
  hyphens: auto;
}

/* Justified text creates uneven gaps and ugly hyphen breaks in a narrow
   column; fall back to ragged-right on phones and small tablets. */
@media (max-width: 768px) {
  article p, article li { text-align: left; hyphens: none; }
}

:focus-visible {
  outline: 2px solid var(--fg);
  outline-offset: 2px;
  border-radius: 2px;
}

header {
  margin-bottom: 3rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 1rem;
}
header h1 { margin: 0 0 0.25rem; font-size: 1.4rem; }
header h1 a { text-decoration: none; color: var(--fg); }
header p { margin: 0; color: var(--muted); font-size: 0.88rem; font-family: ui-sans-serif, system-ui, sans-serif; }

.header-row { display: flex; justify-content: space-between; align-items: flex-start; }

nav { margin-top: 0.75rem; font-family: ui-sans-serif, system-ui, sans-serif; font-size: 0.88rem; }
nav a { color: var(--muted); text-decoration: none; margin-right: 1.2rem; }
nav a:hover { color: var(--fg); }

.theme-toggle {
  background: none;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--muted);
  cursor: pointer;
  font-size: 0.82rem;
  font-family: ui-sans-serif, system-ui, sans-serif;
  padding: 0.2rem 0.6rem;
  margin-top: 0.1rem;
  line-height: 1.4;
}
.theme-toggle:hover { color: var(--fg); border-color: var(--fg); }

h1, h2, h3, h4, h5, h6 {
  line-height: 1.3;
  margin-top: 2rem;
  margin-bottom: 0.5rem;
  scroll-margin-top: 1.5rem;
  text-wrap: balance;
}
h1 { font-size: 1.6rem; }
h2 { font-size: 1.25rem; border-bottom: 1px solid var(--border); padding-bottom: 0.25rem; }
h3 { font-size: 1.05rem; }
h4 { font-size: 0.95rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; font-family: ui-sans-serif, system-ui, sans-serif; }
h5, h6 { font-size: 0.9rem; font-style: italic; font-weight: 600; }

a { color: var(--link); }
a:hover { color: var(--link-hover); }
p { margin: 1rem 0; }

figure { margin: 1.5rem 0; text-align: center; }
figure img { display: block; margin: 0 auto; background: #fff; padding: 0.5rem; border-radius: 6px; }
figcaption { margin-top: 0.4rem; font-size: 0.8rem; color: var(--muted); font-family: ui-sans-serif, system-ui, sans-serif; font-style: italic; }

code {
  background: var(--code-bg);
  padding: 0.15em 0.35em;
  border-radius: 3px;
  font-size: 0.88em;
  font-family: ui-monospace, monospace;
}
pre {
  background: var(--code-bg);
  padding: 1rem;
  overflow-x: auto;
  border-radius: 4px;
  font-size: 0.85em;
  line-height: 1.5;
}
pre code { background: none; padding: 0; }

blockquote {
  margin: 1.5rem 0;
  padding-left: 1rem;
  border-left: 3px solid var(--border);
  color: var(--muted);
  font-style: italic;
}

img { max-width: 100%; height: auto; border-radius: 4px; }
hr { border: none; border-top: 1px solid var(--border); margin: 2.5rem 0; }

.table-wrap { overflow-x: auto; max-width: 100%; margin: 1.5rem 0; -webkit-overflow-scrolling: touch; }
table { border-collapse: collapse; width: 100%; font-size: 0.9rem; }
th, td { border: 1px solid var(--border); padding: 0.5rem 0.75rem; text-align: left; }
th { background: var(--code-bg); }

.post-list { list-style: none; padding: 0; margin: 0; }
.post-list li { padding: 0.75rem 0; border-bottom: 1px solid var(--border); }
.post-list li:last-child { border-bottom: none; }
.post-list-row { display: flex; justify-content: space-between; align-items: baseline; gap: 1rem; }
.post-list a { text-decoration: none; font-size: 1rem; }
.post-list a:hover { text-decoration: underline; }
.post-date { color: var(--muted); font-size: 0.82rem; font-family: ui-sans-serif, system-ui, sans-serif; white-space: nowrap; }
.post-desc { margin: 0.25rem 0 0; color: var(--muted); font-size: 0.85rem; }

.tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.35rem; }
.tag {
  font-family: ui-sans-serif, system-ui, sans-serif;
  font-size: 0.78rem;
  color: var(--muted);
  text-decoration: none;
  letter-spacing: 0.01em;
}
.tag:hover { color: var(--fg); }

.tag-list { list-style: none; padding: 0; margin: 0; }
.tag-list li { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--border); font-family: ui-sans-serif, system-ui, sans-serif; }
.tag-list li:last-child { border-bottom: none; }
.tag-count { color: var(--muted); font-size: 0.85rem; }

.post-header { margin-bottom: 2rem; }
.post-header h1 { margin-top: 0; margin-bottom: 0.5rem; }
.post-meta { color: var(--muted); font-size: 0.85rem; font-family: ui-sans-serif, system-ui, sans-serif; display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }

.toc {
  background: var(--code-bg);
  border-radius: 4px;
  padding: 1rem 1.25rem;
  margin: 2rem 0;
  font-family: ui-sans-serif, system-ui, sans-serif;
  font-size: 0.88rem;
}
.toc::before { content: "Contents"; font-weight: 600; display: block; margin-bottom: 0.5rem; }
.toc ul { margin: 0; padding-left: 1.25rem; }
.toc li { margin: 0.2rem 0; }
.toc a { color: var(--muted); text-decoration: none; }
.toc a:hover { color: var(--fg); }

footer {
  margin-top: 4rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
  font-family: ui-sans-serif, system-ui, sans-serif;
  font-size: 0.82rem;
  color: var(--muted);
}

@media print {
  :root, [data-theme="dark"] {
    --bg: #fff; --fg: #000; --muted: #444; --border: #ccc; --code-bg: #f4f4f4;
  }
  body { padding: 0; font-size: 11pt; }
  nav, .theme-toggle, footer, .toc { display: none; }
  a { text-decoration: none; }
  pre, blockquote, figure, tr { break-inside: avoid; }
}
</style>
</head>

<header>

    <div>
      <h1><a href="./index.html">seku's blog</a></h1>
      <p>Chronicles of a Product Security Engineer</p>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">◑</button>
  </div>
  <nav>

    <a href="./tags/index.html">tags</a>
    <a href="./about.html">about</a>
  </nav>
</header>
<ul class="post-list"><li><div class="post-list-row"><a href="./posts/threat-modeling-browsers-storage.html">Threat Modeling Browser’s Storage</a><span class="post-date">Jun 2026</span></div><div class="tags"><a class="tag" href="./tags/security.html">#security</a><a class="tag" href="./tags/browser.html">#browser</a><a class="tag" href="./tags/web.html">#web</a></div></li></ul>
<footer>

<script>
function toggleTheme(){
  var r=document.documentElement;
  var cur=r.getAttribute('data-theme');
  var sys=window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';
  var next=cur?(cur==='dark'?'light':'dark'):(sys==='dark'?'light':'dark');
  r.setAttribute('data-theme',next);
  localStorage.setItem('theme',next);
}
</script>
</body>
</html>
